function lsGet(key) {
  try { var v = localStorage.getItem(key); return Promise.resolve(v ? {value:v} : null); }
  catch(e) { return Promise.resolve(null); }
}
function lsSet(key, value) {
  try { localStorage.setItem(key, value); } catch(e) {}
  return Promise.resolve({value:value});
}

function AppWithDocs(p) {
  var apiKey = p.apiKey;
  var AREAS_LOCAL = [
    {id:"prescreening",label:"Pre-screening RAF",color:"#374151",bg:"#F3F4F6"},
    {id:"gobernanza",label:"Gobernanza Corporativa",color:"#1C4E7A",bg:"#E8F1F9"},
    {id:"fiduciario",label:"Gestion Financiera",color:"#0B3B2E",bg:"#E6F0EC"},
    {id:"integridad",label:"Integridad",color:"#1A5C45",bg:"#EAF3EE"},
    {id:"ess",label:"Salvaguardas ESS",color:"#2D7A5E",bg:"#EDF7F3"},
    {id:"genero",label:"Politica de Genero",color:"#6B4C9A",bg:"#F3EDF9"},
    {id:"mandato",label:"Mandato y Track Record",color:"#B45309",bg:"#FEF3E2"},
    {id:"gggi",label:"Proceso con GGGI",color:"#059669",bg:"#D1FAE5"},
  ];
  var DOC_STATUS = {
    borrador: {l:"Borrador",c:"#6B7280",b:"#F3F4F6"},
    revision: {l:"En revision",c:"#D97706",b:"#FEF3C7"},
    aprobado: {l:"Aprobado",c:"#059669",b:"#D1FAE5"},
    enviado:  {l:"Enviado GCF",c:"#2563EB",b:"#DBEAFE"},
  };

  var [docs, setDocs]             = useState([]);
  var [docAnalysis, setDocAnalysis] = useState({});
  var [docUploadArea, setDocUploadArea]     = useState("gobernanza");
  var [docUploadDesc, setDocUploadDesc]     = useState("");
  var [docUploadStatus, setDocUploadStatus] = useState("borrador");
  var [docUploadErr, setDocUploadErr]       = useState("");
  var [docsLoaded, setDocsLoaded] = useState(false);

  useEffect(function(){
    lsGet("gcf_docs_meta").then(function(r){
      if(!r){ setDocsLoaded(true); return; }
      try {
        var meta = JSON.parse(r.value);
        Promise.all(meta.map(function(d){
          return lsGet("gcf_doc_"+d.id).then(function(r2){ return Object.assign({},d,{b64:r2?r2.value:null}); });
        })).then(function(full){ setDocs(full); setDocsLoaded(true); });
      } catch(e){ setDocsLoaded(true); }
    });
  },[]);

  useEffect(function(){
    if(!docsLoaded) return;
    lsSet("gcf_docs_meta", JSON.stringify(docs.map(function(d){
      return {id:d.id,name:d.name,type:d.type,size:d.size,area:d.area,desc:d.desc,status:d.status,uploadedAt:d.uploadedAt};
    })));
  },[docs,docsLoaded]);

  function handleUpload(e) {
    var file = e.target.files[0];
    if(!file) return;
    setDocUploadErr("");
    if(file.size > 4*1024*1024){ setDocUploadErr("Archivo demasiado grande (max 4MB). Para PDFs grandes divide por secciones."); return; }
    var ok = ["application/pdf","image/png","image/jpeg","image/jpg","image/webp","image/gif","text/plain"];
    if(ok.indexOf(file.type)<0){ setDocUploadErr("Formato no soportado. Usa PDF, PNG, JPG, WEBP o TXT. Para DOCX guarda como PDF."); return; }
    var reader = new FileReader();
    reader.onload = function(ev){
      var b64 = ev.target.result.split(",")[1];
      var id = "doc"+Date.now();
      lsSet("gcf_doc_"+id, b64);
      setDocs(function(prev){ return prev.concat([{id:id,name:file.name,type:file.type,size:file.size,area:docUploadArea,desc:docUploadDesc,status:docUploadStatus,uploadedAt:new Date().toISOString(),b64:b64}]); });
      setDocUploadDesc("");
      e.target.value = "";
    };
    reader.readAsDataURL(file);
  }

  function deleteDoc(id) {
    setDocs(function(p){ return p.filter(function(d){ return d.id!==id; }); });
    try{ localStorage.removeItem("gcf_doc_"+id); }catch(e){}
    setDocAnalysis(function(p){ var n=Object.assign({},p); delete n[id]; return n; });
  }

  function analyzeDoc(doc) {
    if(!apiKey){ alert("Configura tu API key de Anthropic primero."); return; }
    if(!doc.b64){ alert("Vuelve a subir el archivo para analizarlo."); return; }
    setDocAnalysis(function(p){ return Object.assign({},p,{[doc.id]:{loading:true,text:""}}); });
    var areaObj = AREAS_LOCAL.find(function(a){ return a.id===doc.area; })||{label:doc.area};
    var sys = "Eres experto revisor de documentos para acreditacion GCF. Institucion de RD con apoyo de GGGI. RAF B.42/13 (oct 2025). Area: "+areaObj.label+"\n\nAnaliza el documento y da:\n1. FORTALEZAS: que cubre bien segun estandares GCF/RAF\n2. BRECHAS: que falta o es insuficiente (clausulas, secciones, politicas concretas)\n3. RECOMENDACIONES: cambios especificos con referencias a requisitos GCF\n4. PRIORIDADES: las 3 mejoras mas urgentes para la acreditacion\nResponde en espanol, se muy especifico.";
    var isImg = doc.type.indexOf("image/")===0;
    var isTxt = doc.type==="text/plain";
    var userContent;
    if(isTxt){
      try{ var t=atob(doc.b64); userContent=[{type:"text",text:"Documento '"+doc.name+"':\n\n"+t+"\n\nAnaliza para el area de "+areaObj.label+(doc.desc?". Contexto: "+doc.desc:"")+"."} ]; }
      catch(e){ userContent=[{type:"text",text:"Error al leer el archivo."}]; }
    } else if(isImg){
      userContent=[{type:"image",source:{type:"base64",media_type:doc.type,data:doc.b64}},{type:"text",text:"Analiza este documento '"+doc.name+"' para el area de "+areaObj.label+(doc.desc?". Contexto: "+doc.desc:"")+"."} ];
    } else {
      userContent=[{type:"document",source:{type:"base64",media_type:"application/pdf",data:doc.b64}},{type:"text",text:"Analiza este documento '"+doc.name+"' para el area de "+areaObj.label+(doc.desc?". Contexto: "+doc.desc:"")+"."} ];
    }
    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,system:sys,messages:[{role:"user",content:userContent}]})
    }).then(function(r){return r.json();}).then(function(d){
      var txt=(d.content&&d.content[0]&&d.content[0].text)?d.content[0].text:"Error: "+(d.error?JSON.stringify(d.error):"desconocido");
      setDocAnalysis(function(p){return Object.assign({},p,{[doc.id]:{loading:false,text:txt}});});
    }).catch(function(e){
      setDocAnalysis(function(p){return Object.assign({},p,{[doc.id]:{loading:false,text:"Error de conexion: "+e.message}});});
    });
  }

  function fmtSize(b){ if(b>=1048576) return (b/1048576).toFixed(1)+" MB"; if(b>=1024) return Math.round(b/1024)+" KB"; return b+" B"; }
  function fileIconFn(t){ if(t==="application/pdf") return "📕"; if(t&&t.indexOf("image/")===0) return "🖼"; return "📄"; }

  return <GCFApp apiKey={apiKey}
    docs={docs} docAnalysis={docAnalysis} analyzeDoc={analyzeDoc} deleteDoc={deleteDoc}
    fmtSize={fmtSize} fileIconFn={fileIconFn} DOC_STATUS={DOC_STATUS} AREAS_LOCAL={AREAS_LOCAL}
    docUploadArea={docUploadArea} setDocUploadArea={setDocUploadArea}
    docUploadDesc={docUploadDesc} setDocUploadDesc={setDocUploadDesc}
    docUploadStatus={docUploadStatus} setDocUploadStatus={setDocUploadStatus}
    docUploadErr={docUploadErr} handleUpload={handleUpload}
  />;
}

                  </Fld>
                  <Fld label="Icono">
                    <input value={mlForm.icon} onChange={function(e){setMlForm(function(f){return Object.assign({},f,{icon:e.target.value});});}} style={INP} placeholder="Emoji, ej: 📋"/>
                  </Fld>
                </div>
                <Fld label="Situacion actual / Avance real">
                  <textarea value={mlForm.nota} onChange={function(e){setMlForm(function(f){return Object.assign({},f,{nota:e.target.value});});}} rows={3} placeholder="Ej: Reunimos con GGGI el 15 de mayo. Borrador de politica en revision con Legal. Esperamos aprobacion para julio." style={Object.assign({},INP,{resize:"vertical"})}/>
                </Fld>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={saveML} style={{flex:1,background:C.forest,color:"white",border:"none",padding:10,borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:13}}>Guardar Hito</button>
                  <button onClick={function(){setShowMLF(false);setEditML(null);}} style={{flex:1,background:"#F3F4F6",color:"#374151",border:"none",padding:10,borderRadius:8,cursor:"pointer",fontSize:13}}>Cancelar</button>
                </div>
              </Modal>
            )}

            <div style={{background:C.white,borderRadius:11,border:"1px solid "+C.bord,padding:"18px 20px",marginBottom:14}}>
              {miles.map(function(m,i){
                var phColors={"Fase 0":"#0B3B2E","Fase 1":"#1A5C45","Fase 2":"#1C4E7A","Fase 3":"#6B4C9A","Fase 4":"#B45309","Fase 5":"#059669"};
                var phC=phColors[m.ph]||C.forest;
                var stMap={activo:{l:"En curso",c:"#2563EB",b:"#DBEAFE"},completado:{l:"Completado",c:"#059669",b:"#D1FAE5"},pendiente:{l:"Pendiente",c:C.muted,b:"#F3F4F6"}};
                var stCfg=stMap[m.sta]||stMap["pendiente"];
                return <div key={m.id||i} style={{display:"flex",gap:14,marginBottom:12}}>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}}>
                    <div style={{width:36,height:36,borderRadius:"50%",background:phC,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>{m.icon}</div>
                    {i<miles.length-1 && <div style={{width:2,flex:1,minHeight:12,background:phC+"30",margin:"3px 0"}}/>}
                  </div>
                  <div style={{flex:1,paddingBottom:10,borderBottom:i<miles.length-1?"1px solid #F3F4F6":"none"}}>
                    <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap",marginBottom:3}}>
                      <Badge text={m.ph} color={phC} bg={phC+"18"} size={9}/>
                      <span style={{fontSize:12,fontWeight:700}}>{m.title}</span>
                      <button onClick={function(){cycleMLSta(m.id||("m"+i));}} style={{background:stCfg.b,border:"none",padding:"2px 8px",borderRadius:8,cursor:"pointer",fontSize:9,fontWeight:700,color:stCfg.c}} title="Clic para cambiar estado">{stCfg.l} ↻</button>
                      {m.mo && <Badge text={"Mes "+m.mo} color={C.muted} bg="#F3F4F6" size={9}/>}
                      <div style={{marginLeft:"auto",display:"flex",gap:3}}>
                        <button onClick={function(){openEditML(m);}} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:11,padding:"1px 4px",color:C.muted}} title="Editar hito">✏️</button>
                        <button onClick={function(){setMiles(function(ms){return ms.filter(function(x){return (x.id||("m"+ms.indexOf(x)))!==(m.id||("m"+i));});});}} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:11,padding:"1px 4px",color:"#DC2626"}} title="Eliminar">🗑</button>
                      </div>
                    </div>
                    <div style={{fontSize:10,color:C.muted,lineHeight:1.6}}>{m.desc}</div>
                    {m.nota && <div style={{fontSize:10,color:"#374151",background:C.goldL,padding:"6px 10px",borderRadius:5,marginTop:5,borderLeft:"2px solid "+C.gold,lineHeight:1.55}}><strong style={{color:"#78570A"}}>Situacion actual:</strong> {m.nota}</div>}
                  </div>
                </div>;
              })}
            </div>

            <div style={{background:C.white,borderRadius:11,border:"1px solid "+C.bord,padding:"16px 18px"}}>
              <div style={{fontSize:12,fontWeight:700,color:C.forest,marginBottom:10}}>Factores Criticos de Exito con GGGI</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))",gap:9}}>
                {[
                  {t:"GGGI como guia tecnico",d:"Usar a GGGI al maximo para gap assessment, desarrollo de politicas y revision del formulario antes de enviarlo al GCF."},
                  {t:"Readiness Grants activos",d:"Activar los fondos Readiness disponibles. Solicitar via CNCCMDL con GGGI como Delivery Partner certificado."},
                  {t:"Pre-screening primero",d:"Bajo RAF 2025, el pre-screening es el primer paso formal. Enviarlo antes del 27 mayo 2026 para la ventana de julio."},
                  {t:"AND como aliado estrategico",d:"Coordinacion constante con CNCCMDL. Su carta de nominacion es el primer documento requerido."},
                  {t:"Documentar todo ahora",d:"Registrar cada proyecto ambiental con metricas E&S. El track record es tan importante como las politicas escritas."},
                  {t:"Genero y GRM primero",d:"Son las condiciones mas comunes del Panel. Resolverlas antes de aplicar aumenta la probabilidad de aprobar sin condicionantes."},
                ].map(function(f,i){
                  return <div key={i} style={{padding:"9px 11px",background:C.sand,borderRadius:7,borderLeft:"3px solid "+C.gold}}>
                    <div style={{fontSize:10,fontWeight:700,color:"#78570A",marginBottom:3}}>{f.t}</div>
                    <div style={{fontSize:9,color:C.text,lineHeight:1.5}}>{f.d}</div>
                  </div>;
                })}
              </div>
            </div>
          </div>
        )}

        {view==="ai" && (
          <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 185px)",minHeight:520}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{width:38,height:38,borderRadius:"50%",background:C.forest,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🌿</div>
              <div>
                <div style={{fontWeight:700,fontSize:13,color:C.forest}}>Asesor IA - Acreditacion GCF - RD</div>
                <div style={{fontSize:10,color:C.muted}}>RAF 2025 - CNCCMDL - GGGI - NDC-RD - Benchmark 6 entidades - Portafolio activo</div>
              </div>
            </div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
              {["Que brechas criticas tenemos?","Analiza portafolio vs GCF","Como acelerar la acreditacion?","Draft politica de genero GCF","Explica el RAF 2025","Condiciones frecuentes del Panel"].map(function(q){
                return <button key={q} onClick={function(){setAiIn(q);}} style={{fontSize:10,padding:"3px 9px",borderRadius:10,border:"1px solid "+C.bord,background:C.white,cursor:"pointer",color:C.text}}>{q}</button>;
              })}
            </div>
            <div style={{flex:1,overflowY:"auto",background:C.white,borderRadius:10,border:"1px solid "+C.bord,padding:18,display:"flex",flexDirection:"column",gap:14}}>
              {msgs.map(function(m,i){
                return <div key={i} style={{display:"flex",gap:8,flexDirection:m.role==="user"?"row-reverse":"row"}}>
                  <div style={{width:30,height:30,borderRadius:"50%",background:m.role==="user"?C.gold:C.forest,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>{m.role==="user"?"👤":"🌿"}</div>
                  <div style={{maxWidth:"78%",padding:"11px 13px",borderRadius:m.role==="user"?"11px 4px 11px 11px":"4px 11px 11px 11px",background:m.role==="user"?C.forest:"#F9FAFB",color:m.role==="user"?"white":C.text,fontSize:11,lineHeight:1.65,whiteSpace:"pre-wrap"}}>{m.text}</div>
                </div>;
              })}
              {aiLoad && <div style={{display:"flex",gap:8}}>
                <div style={{width:30,height:30,borderRadius:"50%",background:C.forest,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>🌿</div>
                <div style={{padding:"11px 13px",background:"#F9FAFB",borderRadius:"4px 11px 11px 11px",fontSize:11,color:C.muted}}>Analizando contexto institucional...</div>
              </div>}
              <div ref={aiRef}/>
            </div>
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <input value={aiIn} onChange={function(e){setAiIn(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")sendAI();}} placeholder="Consulta sobre acreditacion GCF, brechas, politicas, estrategias..." style={Object.assign({},INP,{flex:1,padding:"10px 13px"})}/>
              <button onClick={sendAI} disabled={aiLoad||!aiIn.trim()} style={{background:aiLoad||!aiIn.trim()?"#9CA3AF":C.forest,color:"white",border:"none",padding:"10px 16px",borderRadius:7,cursor:aiLoad||!aiIn.trim()?"not-allowed":"pointer",fontWeight:700,fontSize:11}}>{aiLoad?"...":"Enviar"}</button>
            </div>
          </div>
        )}


        {view==="documentos" && (
          <div>
            <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:16}}>
              <div>
                <div style={{fontSize:16,fontWeight:700,color:C.forest}}>Centro de Documentos</div>
                <div style={{fontSize:11,color:C.muted,marginTop:2}}>Sube politicas, auditorias, estatutos y borradores para analizarlos con IA contra los requisitos GCF/RAF 2025</div>
              </div>
              <div style={{marginLeft:"auto",background:C.goldL,border:"1px solid "+C.gold,borderRadius:8,padding:"8px 12px",fontSize:10,color:"#78570A",lineHeight:1.5,maxWidth:220,flexShrink:0}}>
                <strong>Formatos:</strong> PDF, PNG, JPG, WEBP, TXT<br/>
                Max 4MB. Para DOCX usa Archivo → Guardar como PDF
              </div>
            </div>
            <div style={{background:C.white,borderRadius:11,border:"1px solid "+C.bord,padding:"18px 20px",marginBottom:16}}>
              <div style={{fontSize:12,fontWeight:700,color:C.forest,marginBottom:14}}>Subir Nuevo Documento</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
                <Fld label="Area GCF"><select value={docUploadArea} onChange={function(e){setDocUploadArea(e.target.value);}} style={SEL}>{AREAS.map(function(a){return <option key={a.id} value={a.id}>{a.label}</option>;})}</select></Fld>
                <Fld label="Estado"><select value={docUploadStatus} onChange={function(e){setDocUploadStatus(e.target.value);}} style={SEL}>{Object.keys(DOC_STATUS).map(function(k){return <option key={k} value={k}>{DOC_STATUS[k].l}</option>;})}</select></Fld>
                <Fld label="Descripcion (opcional)"><input value={docUploadDesc} onChange={function(e){setDocUploadDesc(e.target.value);}} style={INP} placeholder="Ej: Borrador AML/CFT v2"/></Fld>
              </div>
              <label style={{display:"block",border:"2px dashed "+C.gold,borderRadius:10,padding:"22px",textAlign:"center",cursor:"pointer",background:C.goldL}}>
                <div style={{fontSize:32,marginBottom:6}}>📎</div>
                <div style={{fontSize:13,fontWeight:600,color:C.forest}}>Haz clic para seleccionar archivo</div>
                <div style={{fontSize:11,color:C.muted,marginTop:3}}>PDF, PNG, JPG, WEBP, TXT - Maximo 4MB</div>
                <input type="file" onChange={handleUpload} accept=".pdf,.png,.jpg,.jpeg,.webp,.gif,.txt" style={{display:"none"}}/>
              </label>
              {docUploadErr && <div style={{fontSize:11,color:"#DC2626",marginTop:8,padding:"8px 12px",background:"#FEE2E2",borderRadius:6}}>{docUploadErr}</div>}
            </div>
            {docs.length===0 && (
              <div style={{textAlign:"center",padding:"48px 20px",color:C.muted,background:C.white,borderRadius:11,border:"1px dashed "+C.bord}}>
                <div style={{fontSize:40,marginBottom:12}}>📂</div>
                <div style={{fontSize:14,fontWeight:600,marginBottom:6}}>Sin documentos aun</div>
                <div style={{fontSize:12}}>Sube tus politicas, manuales, auditorias o borradores para analizarlos contra los requisitos GCF</div>
              </div>
            )}
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {docs.map(function(doc){
                var area=AREAS.find(function(a){return a.id===doc.area;})||{label:doc.area,color:C.muted,bg:C.sand};
                var dSta=DOC_STATUS[doc.status]||{l:"Borrador",c:"#6B7280",b:"#F3F4F6"};
                var analysis=docAnalysis[doc.id]||{};
                return <div key={doc.id} style={{background:C.white,borderRadius:11,border:"1px solid "+C.bord,overflow:"hidden"}}>
                  <div style={{padding:"14px 16px",display:"flex",gap:12,alignItems:"flex-start"}}>
                    <div style={{fontSize:28,flexShrink:0}}>{fileIconFn(doc.type)}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:5}}>
                        <Badge text={area.label} color={area.color} bg={area.bg} size={10}/>
                        <Badge text={dSta.l} color={dSta.c} bg={dSta.b} size={10}/>
                        <span style={{fontSize:10,color:C.muted}}>{fmtSize(doc.size)} - {new Date(doc.uploadedAt).toLocaleDateString("es-DO")}</span>
                      </div>
                      <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:2}}>{doc.name}</div>
                      {doc.desc && <div style={{fontSize:11,color:C.muted}}>{doc.desc}</div>}
                      {!doc.b64 && <div style={{fontSize:10,color:"#D97706",marginTop:4}}>Recarga el archivo para poder analizarlo con IA</div>}
                    </div>
                    <div style={{display:"flex",gap:6,flexShrink:0}}>
                      <button onClick={function(){analyzeDoc(doc);}} disabled={analysis.loading||!doc.b64} style={{background:analysis.loading||!doc.b64?"#9CA3AF":C.forest,color:"white",border:"none",padding:"7px 12px",borderRadius:7,cursor:analysis.loading||!doc.b64?"not-allowed":"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{analysis.loading?"Analizando...":"Analizar con IA"}</button>
                      <button onClick={function(){deleteDoc(doc.id);}} style={{background:"#FEE2E2",border:"none",padding:"7px 9px",borderRadius:7,cursor:"pointer",fontSize:12,color:"#DC2626"}}>🗑</button>
                    </div>
                  </div>
                  {analysis.text && (
                    <div style={{borderTop:"1px solid "+C.bord,padding:"16px",background:"#FAFDF9"}}>
                      <div style={{fontSize:11,fontWeight:700,color:C.forest,marginBottom:8}}>Analisis GCF - {area.label}</div>
                      <div style={{fontSize:11,color:C.text,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{analysis.text}</div>
                    </div>
                  )}
                </div>;
              })}
            </div>
          </div>
        )}

      </div>
      <style>{"*{box-sizing:border-box}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:4px}select,input,textarea{font-family:inherit}"}</style>
    </div>
  );

}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

  </script>
</body>
</html>
